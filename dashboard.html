<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard – Sensei</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#14B8A6">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Sensei">
    <link rel="apple-touch-icon" href="icon.svg">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #F5F5F4;
            min-height: 100vh;
            padding-bottom: 72px;
        }

        /* ── Welcome header ── */
        .welcome-header {
            background: linear-gradient(160deg, #0D9488 0%, #14B8A6 55%, #2DD4BF 100%);
            padding: 28px 20px 32px;
            position: relative;
            overflow: hidden;
        }

        .welcome-header::after {
            content: '';
            position: absolute;
            bottom: -30px;
            left: 0;
            right: 0;
            height: 60px;
            background: #F5F5F4;
            border-radius: 50% 50% 0 0 / 100% 100% 0 0;
        }

        .header-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .app-logo {
            display: flex;
            align-items: center;
            gap: 9px;
        }

        .avatar {
            width: 36px;
            height: 36px;
            background: rgba(255,255,255,0.25);
            border: 1.5px solid rgba(255,255,255,0.5);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 700;
            color: white;
        }

        .app-name {
            font-size: 15px;
            font-weight: 600;
            color: rgba(255,255,255,0.9);
        }

        .online-dot-wrap {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 11.5px;
            color: rgba(255,255,255,0.75);
        }

        .online-dot {
            width: 7px;
            height: 7px;
            background: #86EFAC;
            border-radius: 50%;
        }

        .welcome-text {
            position: relative;
            z-index: 1;
        }

        .welcome-title {
            font-size: 26px;
            font-weight: 800;
            color: white;
            line-height: 1.15;
            margin-bottom: 5px;
            letter-spacing: -0.3px;
        }

        .welcome-date {
            font-size: 13.5px;
            color: rgba(255,255,255,0.78);
            font-weight: 400;
        }

        /* ── Page body ── */
        .page-body {
            padding: 0 16px;
        }

        /* ── Section titles ── */
        .section-title {
            font-size: 15px;
            font-weight: 700;
            color: #1C1917;
            margin-bottom: 12px;
        }

        /* ── Stats ── */
        .stats-wrap {
            margin-top: -16px;
            margin-bottom: 28px;
            position: relative;
            z-index: 5;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .stat-card {
            background: white;
            border-radius: 16px;
            border: 1.5px solid #E7E5E4;
            padding: 14px 10px 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }

        .stat-icon {
            font-size: 20px;
            line-height: 1;
            margin-bottom: 2px;
        }

        .stat-value {
            font-size: 30px;
            font-weight: 800;
            color: #0D9488;
            line-height: 1;
            letter-spacing: -1px;
        }

        .stat-label {
            font-size: 10.5px;
            font-weight: 500;
            color: #A8A29E;
            text-align: center;
            line-height: 1.3;
        }

        /* ── Continue Learning ── */
        .continue-section {
            margin-bottom: 28px;
        }

        .continue-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .continue-card {
            background: white;
            border: 1.5px solid #E7E5E4;
            border-radius: 16px;
            padding: 18px 14px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            text-decoration: none;
            cursor: pointer;
            transition: transform 0.16s, box-shadow 0.16s, border-color 0.16s;
            box-shadow: 0 1px 4px rgba(0,0,0,0.05);
        }

        .continue-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 14px rgba(0,0,0,0.09);
        }

        .continue-card:active { transform: translateY(0); }

        .vocab-card { border-top: 3px solid #14B8A6; }
        .chat-card  { border-top: 3px solid #8B5CF6; }

        .continue-icon {
            font-size: 26px;
            line-height: 1;
        }

        .continue-title {
            font-size: 14px;
            font-weight: 700;
            color: #1C1917;
            line-height: 1.25;
        }

        .continue-sub {
            font-size: 11.5px;
            color: #A8A29E;
            line-height: 1.3;
        }

        .continue-arrow {
            font-size: 11px;
            font-weight: 600;
            margin-top: 4px;
        }

        .vocab-card .continue-arrow { color: #14B8A6; }
        .chat-card  .continue-arrow { color: #8B5CF6; }

        /* ── Progress section ── */
        .progress-section {
            margin-bottom: 12px;
        }

        .progress-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .progress-row {}

        .progress-row-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }

        .topic-label {
            font-size: 13.5px;
            font-weight: 600;
            color: #292524;
        }

        .topic-count {
            font-size: 12.5px;
            font-weight: 600;
            color: #78716C;
        }

        .topic-count span {
            color: #0D9488;
        }

        .bar-track {
            height: 9px;
            background: #E7E5E4;
            border-radius: 5px;
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #14B8A6, #0D9488);
            border-radius: 5px;
            transition: width 0.7s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .bar-fill.empty { background: #E7E5E4; }

        .topic-pct {
            font-size: 11px;
            color: #A8A29E;
            margin-top: 3px;
            text-align: right;
        }

        /* ── Bottom navigation ── */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 64px;
            background: white;
            border-top: 1px solid #E7E5E4;
            display: flex;
            z-index: 30;
            box-shadow: 0 -1px 8px rgba(0,0,0,0.05);
        }

        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 3px;
            text-decoration: none;
            color: #A8A29E;
            font-size: 10.5px;
            font-weight: 500;
            transition: color 0.18s;
            cursor: pointer;
            border: none;
            background: none;
            font-family: inherit;
        }

        .nav-item.active { color: #14B8A6; }
        .nav-item:hover:not(.active) { color: #78716C; }

        .nav-icon {
            width: 22px;
            height: 22px;
        }

        .nav-item.active .nav-icon { stroke: #14B8A6; }

        /* ── Dark mode toggle button (sits on teal hero) ── */
        .dark-toggle-btn {
            width: 34px; height: 34px;
            border-radius: 50%;
            border: 1.5px solid rgba(255,255,255,0.35);
            background: rgba(255,255,255,0.15);
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            color: white;
            flex-shrink: 0; padding: 0;
            transition: background 0.18s;
        }
        .dark-toggle-btn:hover { background: rgba(255,255,255,0.28); }

        /* ── Dark mode overrides ── */
        [data-theme="dark"] body                         { background: #1A1A2E; }
        [data-theme="dark"] .welcome-header::after       { background: #1A1A2E; }
        [data-theme="dark"] .stat-card                   { background: #2D2D44; border-color: #3D3D5C; }
        [data-theme="dark"] .stat-label                  { color: #8888A8; }
        [data-theme="dark"] .section-title               { color: #E5E5E5; }
        [data-theme="dark"] .continue-card               { background: #2D2D44; border-color: #3D3D5C; }
        [data-theme="dark"] .continue-title              { color: #E5E5E5; }
        [data-theme="dark"] .continue-sub                { color: #8888A8; }
        [data-theme="dark"] .bar-track                   { background: #3D3D5C; }
        [data-theme="dark"] .topic-label                 { color: #E5E5E5; }
        [data-theme="dark"] .topic-count                 { color: #B0B0C8; }
        [data-theme="dark"] .topic-pct                   { color: #8888A8; }
        [data-theme="dark"] .bottom-nav                  { background: #2D2D44; border-color: #3D3D5C; }
        [data-theme="dark"] .nav-item                    { color: #8888A8; }
        [data-theme="dark"] .nav-item:hover:not(.active) { color: #B0B0C8; }
    </style>
    <script>if(localStorage.getItem('sensei_dark_mode')==='dark')document.documentElement.setAttribute('data-theme','dark');</script>
</head>
<body>

<!-- Welcome header -->
<div class="welcome-header">
    <div class="header-row">
        <div class="app-logo">
            <div class="avatar">S</div>
            <span class="app-name">Sensei</span>
        </div>
        <div style="display:flex;align-items:center;gap:10px;">
            <button id="darkToggle" class="dark-toggle-btn" onclick="toggleDarkMode()" title="Toggle dark mode"></button>
            <div class="online-dot-wrap">
                <div class="online-dot"></div>
                Online
            </div>
        </div>
    </div>
    <div class="welcome-text">
        <div class="welcome-title">Welcome back! 👋</div>
        <div class="welcome-date" id="currentDate"></div>
    </div>
</div>

<div class="page-body">

    <!-- Stat cards -->
    <div class="stats-wrap">
        <div class="stats-grid">
            <div class="stat-card">
                <span class="stat-icon">📚</span>
                <span class="stat-value" id="statWords">0</span>
                <span class="stat-label">Words Learned</span>
            </div>
            <div class="stat-card">
                <span class="stat-icon">💬</span>
                <span class="stat-value" id="statConvos">0</span>
                <span class="stat-label">Conversations</span>
            </div>
            <div class="stat-card">
                <span class="stat-icon">🔥</span>
                <span class="stat-value" id="statStreak">0</span>
                <span class="stat-label">Day Streak</span>
            </div>
        </div>
    </div>

    <!-- Continue Learning -->
    <section class="continue-section">
        <div class="section-title">Continue Learning</div>
        <div class="continue-grid">
            <a href="vocab.html" class="continue-card vocab-card">
                <span class="continue-icon">📖</span>
                <span class="continue-title">Practice Vocabulary</span>
                <span class="continue-sub">Flashcards &amp; word drills</span>
                <span class="continue-arrow">Start →</span>
            </a>
            <a class="continue-card chat-card" onclick="startChat()" style="cursor:pointer">
                <span class="continue-icon">💬</span>
                <span class="continue-title">Chat with Sensei</span>
                <span class="continue-sub">Conversational practice</span>
                <span class="continue-arrow">Start →</span>
            </a>
        </div>
    </section>

    <!-- Progress -->
    <section class="progress-section" id="progress">
        <div class="section-title">Your Progress</div>
        <div class="progress-list" id="progressList"></div>
    </section>

</div>

<!-- Bottom nav -->
<nav class="bottom-nav">
    <a href="dashboard.html" class="nav-item active">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
            <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
        </svg>
        Dashboard
    </a>
    <a href="vocab.html" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="3" width="20" height="14" rx="2"/>
            <line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/>
        </svg>
        Vocab
    </a>
    <a href="index.html" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
        Practice
    </a>
    <a href="progress.html" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/>
            <line x1="6"  y1="20" x2="6"  y2="14"/>
        </svg>
        Progress
    </a>
</nav>

<script>
    const TOPICS = {
        greetings: { label: 'Greetings', emoji: '👋', total: 6 },
        food:      { label: 'Food',      emoji: '🍜', total: 7 },
        travel:    { label: 'Travel',    emoji: '✈️', total: 7 },
        business:  { label: 'Business',  emoji: '💼', total: 7 }
    };

    /* ── Date ── */
    document.getElementById('currentDate').textContent = new Date().toLocaleDateString('en-US', {
        weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
    });

    /* ── Words learned ── */
    function getWordsLearned() {
        let count = 0;
        Object.entries(TOPICS).forEach(([topic, { total }]) => {
            for (let i = 0; i < total; i++) {
                if (localStorage.getItem(`sensei_vocab_${topic}_${i}`) === 'known') count++;
            }
        });
        return count;
    }

    /* ── Conversations ── */
    function getConversations() {
        return parseInt(localStorage.getItem('sensei_conversations_count') || '0', 10);
    }

    /* ── Day streak ── */
    function getAndUpdateStreak() {
        const todayStr    = new Date().toISOString().split('T')[0];
        const lastActive  = localStorage.getItem('sensei_last_active');
        let   streak      = parseInt(localStorage.getItem('sensei_streak') || '0', 10);

        if (lastActive === todayStr) {
            return Math.max(streak, 1);
        }

        if (lastActive) {
            const diffMs   = new Date(todayStr) - new Date(lastActive);
            const diffDays = Math.round(diffMs / 86400000);
            streak = diffDays === 1 ? streak + 1 : 1;
        } else {
            streak = 1;
        }

        localStorage.setItem('sensei_streak',      String(streak));
        localStorage.setItem('sensei_last_active', todayStr);
        return streak;
    }

    /* ── Progress bars ── */
    function renderProgress() {
        const list = document.getElementById('progressList');
        list.innerHTML = '';

        Object.entries(TOPICS).forEach(([topic, { label, emoji, total }]) => {
            let known = 0;
            for (let i = 0; i < total; i++) {
                if (localStorage.getItem(`sensei_vocab_${topic}_${i}`) === 'known') known++;
            }
            const pct = total ? Math.round((known / total) * 100) : 0;

            const row = document.createElement('div');
            row.className = 'progress-row';
            row.innerHTML = `
                <div class="progress-row-header">
                    <span class="topic-label">${emoji} ${label}</span>
                    <span class="topic-count"><span>${known}</span> / ${total} words</span>
                </div>
                <div class="bar-track">
                    <div class="bar-fill${known === 0 ? ' empty' : ''}" data-pct="${pct}" style="width:0%"></div>
                </div>
                <div class="topic-pct">${pct}% complete</div>`;
            list.appendChild(row);
        });

        /* Animate bars in after paint */
        requestAnimationFrame(() => requestAnimationFrame(() => {
            document.querySelectorAll('.bar-fill').forEach(bar => {
                bar.style.width = bar.dataset.pct + '%';
            });
        }));
    }

    /* ── Start chat (increments conversations counter) ── */
    function startChat() {
        const n = parseInt(localStorage.getItem('sensei_conversations_count') || '0', 10);
        localStorage.setItem('sensei_conversations_count', String(n + 1));
        window.location.href = 'index.html';
    }

    /* ── Animate stat numbers ── */
    function animateCount(el, target, duration) {
        if (target === 0) return;
        const start = performance.now();
        function step(now) {
            const t   = Math.min((now - start) / duration, 1);
            const val = Math.round(t * target);
            el.textContent = val;
            if (t < 1) requestAnimationFrame(step);
        }
        requestAnimationFrame(step);
    }

    /* ── Init ── */
    const words  = getWordsLearned();
    const convos = getConversations();
    const streak = getAndUpdateStreak();

    animateCount(document.getElementById('statWords'),  words,  600);
    animateCount(document.getElementById('statConvos'), convos, 600);
    animateCount(document.getElementById('statStreak'), streak, 600);

    renderProgress();

    /* ── Dark mode ── */
    const MOON_SVG = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>`;
    const SUN_SVG  = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="2" x2="12" y2="4"/><line x1="12" y1="20" x2="12" y2="22"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="2" y1="12" x2="4" y2="12"/><line x1="20" y1="12" x2="22" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>`;

    function toggleDarkMode() {
        const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
        if (isDark) {
            document.documentElement.removeAttribute('data-theme');
            localStorage.setItem('sensei_dark_mode', 'light');
        } else {
            document.documentElement.setAttribute('data-theme', 'dark');
            localStorage.setItem('sensei_dark_mode', 'dark');
        }
        syncDarkModeIcon();
    }

    function syncDarkModeIcon() {
        const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
        const btn = document.getElementById('darkToggle');
        if (btn) btn.innerHTML = isDark ? SUN_SVG : MOON_SVG;
    }

    syncDarkModeIcon();
</script>
<script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./sw.js').catch(() => {});
    }
</script>
</body>
</html>
